version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: addetect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - addetect

  # ── ML Inference Microservice (FastAPI / YOLOv8) ──────────────────────────
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: addetect-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ml/models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - addetect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Node.js Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: addetect-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/ad_detection
      - ML_SERVICE_URL=http://ml:8001
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
      - ml
    networks:
      - addetect

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: addetect-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - addetect

volumes:
  mongo_data:

networks:
  addetect:
    driver: bridge
